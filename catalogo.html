        // Filtrar productos
        function filterProducts() {
            const categoryFilter = document.getElementById("category-filter").value;
            const subcategoryFilter = document.getElementById("subcategory-filter").value;
            const brandFilter = document.getElementById("brand-filter").value;
            const searchTerm = document.getElementById("search-input").value.toLowerCase().trim();

            filteredProducts = productList.filter(product => {
                const matchesCategory = !categoryFilter || product.Category === categoryFilter;
                const matchesSubcategory = !subcategoryFilter || product.Subcategory === subcategoryFilter;
                
                // Obtener marca del producto (del campo Brand o extraída del nombre)
                const productBrand = getProductBrand(product);
                const matchesBrand = !brandFilter || productBrand === brandFilter;
                
                const matchesSearch = !searchTerm || 
                    (product.Description && product.Description.toLowerCase().includes(searchTerm)) ||
                    (product.Code && product.Code.toString().toLowerCase().includes(searchTerm)) ||
                    (product.Reference && product.Reference.toString().toLowerCase().includes(searchTerm)) ||
                    (productBrand && productBrand.toLowerCase().includes(searchTerm)) ||
                    (product.Category && product.Category.toLowerCase().includes(searchTerm));

                return matchesCategory && matchesSubcategory && matchesBrand && matchesSearch;
            });

            // Ordenar por categoría, subcategoría y precio de venta (menor a mayor)
            filteredProducts.sort((a, b) => {
                const catCompare = a.Category.localeCompare(b.Category, "es", { sensitivity: "base" });
                if (catCompare !== 0) return catCompare;
                const subCompare = compareSubcategory(a.Subcategory, b.Subcategory);
                if (subCompare !== 0) return subCompare;
                return (a.Price || 0) - (b.Price || 0);
            });

            displayedCount = 0;
            renderedGroups = {};
            document.getElementById("catalog-content").innerHTML = "";
            // Render inmediato (sin retraso) para evitar el parpadeo al filtrar
            loadMoreProducts(true);
        }

        // Cargar más productos (scroll infinito)
        // immediate = true renderiza de forma síncrona, evitando el destello
        // en blanco que ocurría al cambiar un filtro.
        function loadMoreProducts(immediate = false) {
            if (isLoading || displayedCount >= filteredProducts.length) return;
            
            isLoading = true;
            const loadingIndicator = document.getElementById("loading-more");
            const catalogContent = document.getElementById("catalog-content");
            
            if (displayedCount > 0) {
                loadingIndicator.style.display = "block";
            }

            const renderBatch = () => {
                // Estado vacío
                if (filteredProducts.length === 0 && displayedCount === 0) {
                    catalogContent.innerHTML = `
                        <div class="empty-state">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                            </svg>
                            <h3>No se encontraron productos</h3>
                            <p>Intenta ajustar los filtros o términos de búsqueda</p>
                        </div>
                    `;
                    loadingIndicator.style.display = "none";
                    isLoading = false;
                    return;
                }

                // Calcular el rango de productos a mostrar
                const startIndex = displayedCount;
                const endIndex = Math.min(displayedCount + PRODUCTS_PER_LOAD, filteredProducts.length);
                const productsToShow = filteredProducts.slice(startIndex, endIndex);
                
                // Agrupar solo los productos del lote actual
                let currentCategory = null;
                let currentSubcategory = null;
                let currentGrid = null;
                
                for (let i = 0; i < productsToShow.length; i++) {
                    const product = productsToShow[i];
                    const category = product.Category;
                    const subcategory = product.Subcategory;
                    const groupKey = `${category}|||${subcategory}`;
                    
                    // Si cambia la categoría, agregar header de categoría
                    if (category !== currentCategory) {
                        // Cerrar grid anterior si existe
                        if (currentGrid) {
                            catalogContent.appendChild(currentGrid);
                            currentGrid = null;
                        }
                        
                        // Solo agregar header si no existe ya
                        if (!renderedGroups[`cat_${category}`]) {
                            const categoryHeader = document.createElement('div');
                            categoryHeader.className = 'category-header';
                            categoryHeader.textContent = category;
                            catalogContent.appendChild(categoryHeader);
                            renderedGroups[`cat_${category}`] = true;
                        }
                        currentCategory = category;
                        currentSubcategory = null; // Reset subcategoría
                    }
                    
                    // Si cambia la subcategoría, agregar header de subcategoría
                    if (subcategory !== currentSubcategory) {
                        // Cerrar grid anterior si existe
                        if (currentGrid) {
                            catalogContent.appendChild(currentGrid);
                        }
                        
                        // Solo agregar header si no existe ya
                        if (!renderedGroups[groupKey]) {
                            const subcategoryHeader = document.createElement('div');
                            subcategoryHeader.className = 'subcategory-header';
                            const subIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M9.828 3h3.982a2 2 0 0 1 1.992 2.181l-.637 7A2 2 0 0 1 13.174 14H2.826a2 2 0 0 1-1.991-1.819l-.637-7a2 2 0 0 1 .342-1.31L.5 3a2 2 0 0 1 2-2h3.672a2 2 0 0 1 1.414.586l.828.828A2 2 0 0 0 9.828 3zm-8.322.12q.322-.119.687-.12h8.66l-.31-.31L8.373 1.5H2.5a1 1 0 0 0-1 .981z"/></svg>';
                            const subLabel = document.createElement('span');
                            subLabel.textContent = subcategory.toUpperCase();
                            subcategoryHeader.innerHTML = subIcon;
                            subcategoryHeader.appendChild(subLabel);

                            // Etiquetas con la última palabra de cada producto de esta subcategoría
                            const groupProducts = filteredProducts.filter(p =>
                                p.Category === category && p.Subcategory === subcategory);
                            const uniqueTags = [...new Set(
                                groupProducts.map(p => getLastWordTag(p.Description)).filter(Boolean)
                            )].sort(compareSubcategory);

                            if (uniqueTags.length > 0) {
                                const tagsContainer = document.createElement('span');
                                tagsContainer.className = 'subcat-tags';
                                uniqueTags.forEach(tag => {
                                    const tagEl = document.createElement('span');
                                    tagEl.className = 'subcat-tag';
                                    tagEl.textContent = tag;
                                    tagEl.setAttribute('data-tag', tag);
                                    tagEl.addEventListener('click', (e) => {
                                        e.stopPropagation();
                                        filterProductsByTag(groupKey, tag, tagEl);
                                    });
                                    tagsContainer.appendChild(tagEl);
                                });
                                subcategoryHeader.appendChild(tagsContainer);
                            }

                            catalogContent.appendChild(subcategoryHeader);
                            renderedGroups[groupKey] = true;
                        }
                        
                        // Crear nuevo grid o buscar el existente
                        const existingGrid = document.querySelector(`[data-group="${CSS.escape(groupKey)}"]`);
                        if (existingGrid) {
                            currentGrid = existingGrid;
                        } else {
                            currentGrid = document.createElement('div');
                            currentGrid.className = 'products-grid';
                            currentGrid.setAttribute('data-group', groupKey);
                        }
                        currentSubcategory = subcategory;
                    }
                    
                    // Agregar producto al grid actual
                    const productHTML = createProductCard(product);
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = productHTML;
                    const productElement = tempDiv.firstElementChild;
                    
                    // Si el grid ya está en el DOM, agregar directamente
                    if (currentGrid.parentNode) {
                        currentGrid.appendChild(productElement);
                    } else {
                        currentGrid.appendChild(productElement);
                    }
                }
                
                // Agregar el último grid si existe y no está en el DOM
                if (currentGrid && !currentGrid.parentNode) {
                    catalogContent.appendChild(currentGrid);
                }
                
                displayedCount = endIndex;
                loadingIndicator.style.display = "none";
                isLoading = false;
                
                // Actualizar contador de productos mostrados
                document.getElementById("showing-products").textContent = `${displayedCount} de ${filteredProducts.length}`;
            };

            // Si es inmediato (cambio de filtro), renderizar en el acto para
            // que no haya parpadeo. En el scroll infinito se mantiene el
            // pequeño retraso para mostrar el indicador de carga.
            if (immediate) {
                renderBatch();
            } else {
                setTimeout(renderBatch, 100);
            }
        }

        // Escapar para atributos HTML (maneja comillas dobles y simples)
        function escapeForAttribute(text) {
            if (text === null || text === undefined) return '';
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        // Al hacer clic en una etiqueta de subcategoría, mostrar únicamente
        // el o los productos cuya última palabra coincide con esa etiqueta.
        // Si se vuelve a hacer clic en la misma etiqueta activa, se restauran
        // todos los productos de la subcategoría.
        function filterProductsByTag(groupKey, tagValue, tagElement) {
            const grid = document.querySelector(`[data-group="${CSS.escape(groupKey)}"]`);
            if (!grid) return;

            const wasActive = tagElement.classList.contains('active');

            // Quitar el estado activo de las demás etiquetas de esta misma subcategoría
            const header = tagElement.closest('.subcategory-header');
            if (header) {
                header.querySelectorAll('.subcat-tag').forEach(t => t.classList.remove('active'));
            }

            const cards = grid.querySelectorAll('.product-card');

            if (wasActive) {
                cards.forEach(card => card.classList.remove('hidden-by-tag'));
                return;
            }

            tagElement.classList.add('active');

            cards.forEach(card => {
                const description = card.getAttribute('data-description') || '';
                const cardTag = getLastWordTag(description);
                card.classList.toggle('hidden-by-tag', cardTag !== tagValue);
            });
        }

        // Manejar click en producto
        function handleProductClick(element) {
            const code = element.getAttribute('data-code');
            const description = element.getAttribute('data-description');
            const price = parseFloat(element.getAttribute('data-price'));
            const cost = parseFloat(element.getAttribute('data-cost'));
            addProductToInvoice(code, description, price, cost);
        }

        // Crear tarjeta de producto
        function createProductCard(product) {
            const price = product.Price || 0;
            const cost = product.Cost || 0;
            const priceWithTax = price * 1.07;
            const profit = cost > 0 ? price - cost : 0;
            const margin = cost > 0 ? ((profit / cost) * 100) : 0;
            const productBrand = getProductBrand(product);

            // Usar data attributes para evitar problemas con comillas
            const safeCode = escapeForAttribute(product.Code);
            const safeDescription = escapeForAttribute(product.Description);

            // Imagen de fondo según el código de referencia.
            // Si el producto no tiene código, no se intenta mostrar imagen.
            // Si la imagen no existe en la carpeta "imagenes", se oculta automáticamente (onerror).
            const refCode = (product.Code !== undefined && product.Code !== null)
                ? product.Code.toString().trim()
                : '';
            const imageTag = refCode
                ? `<img class="product-bg-image" src="imagenes/${encodeURIComponent(refCode)}.jpg" alt="" data-ref="${escapeForAttribute(refCode)}" onload="handleImageLoad(this)" onerror="handleImageError(this)">`
                : '';

            // Miniatura en la esquina inferior derecha (solo si hay imagen).
            // Si ninguna extensión existe, se elimina y no se muestra nada.
            const thumbTag = refCode
                ? `<img class="product-thumb" src="imagenes/${encodeURIComponent(refCode)}.jpg" alt="" data-ref="${escapeForAttribute(refCode)}" onerror="handleThumbError(this)">`
                : '';

            return `
                <div class="product-card" data-code="${safeCode}" data-description="${safeDescription}" data-price="${price}" data-cost="${cost}" onclick="handleProductClick(this)">
                    ${imageTag}
                    ${thumbTag}
                    <div class="badges-container">
                        <div>
                            ${cost > 0 ? `<span class="badge badge-cost">Costo: $${cost.toFixed(2)}</span>` : ''}
                        </div>
                        <div>
                            ${cost > 0 ? `<span class="badge badge-margin">${margin.toFixed(0)}%</span>` : ''}
                            ${cost > 0 ? `<span class="badge badge-profit">+$${profit.toFixed(2)}</span>` : ''}
                        </div>
                    </div>
                    
                    <div class="product-category">${escapeHtml(product.Category)}</div>
                    
                    <div class="product-brand">${escapeHtml(productBrand)}</div>
                    <div class="product-name">${escapeHtml(product.Description)}</div>
                    <div class="product-code">Código: ${escapeHtml(product.Code)}</div>
                    
                    <div class="price-section">
                        <div class="price-main"><span>$${priceWithTax.toFixed(2)}</span></div>
                        <div class="price-tax">$${price.toFixed(2)} Sin ITBMS (7%)</div>
                    </div>
                </div>
            `;
        } // <div class="product-subcategory">${escapeHtml(product.Subcategory)}</div>/ linea 1146

        // Probar varias extensiones de imagen para el código de referencia.
        // Si ninguna existe en la carpeta "imagenes", se elimina la imagen (no se muestra nada).
        function handleImageError(img) {
            const ref = img.getAttribute('data-ref');
            const extensions = ['jpg', 'jpeg', 'png', 'webp'];
            let index = parseInt(img.dataset.extIndex || '0', 10);
            index++;
            if (index >= extensions.length) {
                const card = img.closest('.product-card');
                if (card) card.classList.remove('has-image');
                img.remove();
                return;
            }
            img.dataset.extIndex = index;
            img.src = 'imagenes/' + encodeURIComponent(ref) + '.' + extensions[index];
        }

        // Cuando la imagen carga correctamente, marcar la tarjeta para ocultar la info en hover.
        function handleImageLoad(img) {
            const card = img.closest('.product-card');
            if (card) card.classList.add('has-image');
        }

        // Probar varias extensiones para la miniatura de la esquina.
        // Si ninguna existe, se elimina la miniatura (no se muestra nada en la esquina).
        function handleThumbError(img) {
            const ref = img.getAttribute('data-ref');
            const extensions = ['jpg', 'jpeg', 'png', 'webp'];
            let index = parseInt(img.dataset.extIndex || '0', 10);
            index++;
            if (index >= extensions.length) {
                img.remove();
                return;
            }
            img.dataset.extIndex = index;
            img.src = 'imagenes/' + encodeURIComponent(ref) + '.' + extensions[index];
        }

        // Escapar HTML
        function escapeHtml(text) {            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Manejar scroll
        function handleScroll() {
            const scrollPosition = window.innerHeight + window.scrollY;
            const documentHeight = document.documentElement.scrollHeight;
            
            if (scrollPosition >= documentHeight - 500) {
                loadMoreProducts();
            }
        }

        // Toggle botón scroll top
        function toggleScrollTopButton() {
            const scrollBtn = document.getElementById("scroll-top");
            if (window.scrollY > 300) {
                scrollBtn.classList.add("visible");
            } else {
                scrollBtn.classList.remove("visible");
            }
        }

        // Scroll to top
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        // Agregar producto a la factura
        function addProductToInvoice(code, description, price, cost) {
            cost = cost || 0;
            
            let quantity = prompt(`Ingrese la cantidad para "${description}":`, "1");

            if (quantity === null) {
                return;
            }

            quantity = Number.parseInt(quantity);
            if (isNaN(quantity) || quantity <= 0) {
                alert("Por favor ingrese una cantidad válida mayor que cero.");
                return;
            }

            let margin = 0;
            if (cost > 0) {
                margin = ((price - cost) / cost) * 100;
            }

            const selectedProduct = {
                code: code,
                description: description,
                price: price,
                quantity: quantity,
                cost: cost,
                margin: margin
            };

            let selectedProducts = [];
            try {
                const existingProducts = localStorage.getItem("selectedProducts");
                if (existingProducts) {
                    selectedProducts = JSON.parse(existingProducts);
                }
            } catch (e) {
                console.error("Error al analizar productos existentes:", e);
            }

            selectedProducts.push(selectedProduct);

            localStorage.setItem("selectedProducts", JSON.stringify(selectedProducts));
            localStorage.setItem("selectedProduct", JSON.stringify(selectedProduct));

            showNotification(`Producto "${description}" (${quantity} unidades) agregado a la factura`);
        }

        // Mostrar notificación
        function showNotification(message, isError = false) {
            const notification = document.getElementById("notification");
            notification.textContent = message;
            notification.style.background = isError 
                ? "#e53935" 
                : "var(--primary-color)";
            notification.classList.add("show");
            
            setTimeout(() => {
                notification.classList.remove("show");
            }, 3000);
        }

        // Imprimir catálogo
        function printCatalog() {
            window.print();
        }
    </script>
</body>
</html>
